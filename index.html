<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alfa Ai Travel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}


body{

height:100vh;
overflow:hidden;

}


/* ГЛАВНЫЙ ЭКРАН */

.main{

height:100vh;

background:

linear-gradient(
rgba(0,55,80,.25),
rgba(0,25,45,.65)
),

url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80");


background-size:cover;

background-position:center;


display:flex;

align-items:center;

justify-content:center;

text-align:center;

padding:25px;

color:white;

}



/* ЛОГО */

.logo{

position:absolute;

top:35px;

font-size:32px;

font-weight:800;

color:#7dd3fc;

letter-spacing:.5px;

}



/* ЦЕНТР */

.content{

width:100%;

max-width:430px;

}



h1{

font-size:38px;

line-height:1.2;

margin-bottom:20px;

font-weight:800;

}



.subtitle{

font-size:19px;

line-height:1.55;

color:white;

margin-bottom:30px;

font-weight:600;

}



/* AI КНОПКА */

.ai-button{

width:100%;

padding:18px;

border:none;

border-radius:40px;

background:#38bdf8;

color:white;

font-size:18px;

font-weight:700;

cursor:pointer;

box-shadow:

0 10px 30px rgba(0,0,0,.3);

}



/* ОБЩИЕ КНОПКИ */

.action{

width:100%;

padding:15px;

border:none;

border-radius:30px;

background:#0284c7;

color:white;

font-weight:700;

font-size:16px;

cursor:pointer;

}



/* НИЖНЕЕ МЕНЮ */


.bottom-menu{

position:fixed;

bottom:15px;

left:50%;

transform:translateX(-50%);


width:90%;

max-width:430px;


background:rgba(255,255,255,.92);

backdrop-filter:blur(20px);


border-radius:25px;


display:flex;

justify-content:space-around;


padding:12px;


box-shadow:

0 15px 40px rgba(0,0,0,.25);


z-index:20;

}



.bottom-menu a{

text-decoration:none;

color:#334155;


display:flex;

flex-direction:column;

align-items:center;


font-size:12px;

font-weight:600;

}



.bottom-menu span{

font-size:25px;

margin-bottom:3px;

}



/* ОКНА */

.window{

display:none;

position:fixed;

z-index:50;


top:50%;

left:50%;

transform:translate(-50%,-50%);


width:92%;

max-width:420px;


max-height:85vh;

overflow:auto;


background:white;

color:#0f172a;


padding:25px;


border-radius:25px;


box-shadow:

0 20px 60px rgba(0,0,0,.35);

}



.window h2{

margin-bottom:20px;

}



.window p{

margin-bottom:15px;

}



input{

width:100%;

padding:14px;

border-radius:15px;

border:1px solid #cbd5e1;

margin-bottom:12px;

font-size:15px;

}


/* КНОПКИ ВЫБОРА */

.choices{

display:flex;

flex-wrap:wrap;

gap:8px;

margin-bottom:20px;

}


.choices button{

border:1px solid #bae6fd;

background:#f0f9ff;

color:#0369a1;

padding:10px 14px;

border-radius:30px;

font-size:14px;

cursor:pointer;

}


.choices button.active{

background:#0284c7;

color:white;

border-color:#0284c7;

}



.close{

margin-top:12px;

background:#e2e8f0;

color:#0f172a;

}



.contact-link{

display:block;

text-align:center;

padding:15px;

border-radius:30px;

background:#0284c7;

color:white;

text-decoration:none;

margin-bottom:12px;

}



</style>

</head>


<body>


<div class="main">


<div class="logo">

Alfa Ai Travel

</div>



<div class="content">


<h1>

Alfa Ai Travel

</h1>



<div class="subtitle">

подберет для вас идеальный тур
с помощью искусственного интеллекта

</div>



<button class="ai-button" onclick="openAI()">

🤖 НАЧАТЬ AI

</button>


</div>


</div>



<nav class="bottom-menu">


<a href="#" onclick="goHome()">

<span>🏠</span>

Главная

</a>



<a href="#" onclick="openContact()">

<span>☎️</span>

Контакты

</a>



<a href="#" onclick="openLogin()">

<span>👤</span>

Вход

</a>



</nav>
<!-- AI ПОДБОР -->

<div class="window" id="aiWindow">


<h2>
🤖 AI подбор тура
</h2>


<p>
Кто путешествует?
</p>


<div class="choices" id="people">


<button onclick="selectOption(this)">
👤 1 взрослый
</button>


<button onclick="selectOption(this)">
👥 2 взрослых
</button>


<button onclick="selectOption(this)">
👨‍👩‍👧 2 взрослых + ребенок
</button>


<button onclick="selectOption(this)">
👨‍👩‍👦 Семья
</button>


<button onclick="selectOption(this)">
🧑‍🤝‍🧑 Компания
</button>


</div>




<p>
Месяц поездки
</p>


<div class="choices" id="months">

</div>





<p>
Направление
</p>


<div class="choices" id="country">


<button onclick="selectOption(this)">
🇻🇳 Вьетнам
</button>


<button onclick="selectOption(this)">
🇹🇷 Турция
</button>


<button onclick="selectOption(this)">
🇪🇬 Египет
</button>


<button onclick="selectOption(this)">
🇹🇭 Таиланд
</button>


<button onclick="selectOption(this)">
🇦🇪 ОАЭ
</button>


<button onclick="selectOption(this)">
🌴 Мальдивы
</button>


</div>





<p>
Бюджет
</p>


<div class="choices" id="budget">


<button onclick="selectOption(this)">
💵 $
</button>


<button onclick="selectOption(this)">
💵💵 $$
</button>


<button onclick="selectOption(this)">
💵💵💵 $$$
</button>


</div>





<button class="action" onclick="aiSearch()">

🤖 Подбираю AI

</button>



<button class="action close" onclick="closeWindows()">

Закрыть

</button>



</div>
<!-- КОНТАКТЫ -->

<div class="window" id="contactWindow">


<h2>
☎️ Контакты
</h2>


<a class="contact-link" href="tel:+77073790022">

📞 Позвонить

<br>

+7 707 379 00 22

</a>



<a class="contact-link" 
href="https://t.me/kimand8" 
target="_blank">

💬 Telegram

<br>

@kimand8

</a>



<button class="action close" onclick="closeWindows()">

Закрыть

</button>


</div>






<!-- ВХОД -->

<div class="window" id="loginWindow">


<h2>
👤 Вход
</h2>



<input 
placeholder="Ник">



<input 
type="password"
placeholder="Пароль">



<button class="action">

Войти

</button>



<hr style="margin:25px 0;">



<h3>
Регистрация
</h3>


<br>


<input 
id="name"
placeholder="ФИО">


<input 
id="phone"
placeholder="Телефон">


<input 
id="email"
placeholder="Почта">



<button class="action" onclick="sendTelegram()">

Зарегистрироваться

</button>



<button class="action close" onclick="closeWindows()">

Закрыть

</button>


</div>






<script>


// открыть AI

function openAI(){

document
.getElementById("aiWindow")
.style.display="block";

}





// открыть контакты

function openContact(){

document
.getElementById("contactWindow")
.style.display="block";

}




// открыть вход

function openLogin(){

document
.getElementById("loginWindow")
.style.display="block";

}





// закрытие окон

function closeWindows(){

document
.querySelectorAll(".window")
.forEach(

item=>item.style.display="none"

);

}




// главная

function goHome(){

closeWindows();

window.scrollTo({

top:0,

behavior:"smooth"

});

}






// выбор кнопок

function selectOption(button){


let parent=button.parentElement;


parent
.querySelectorAll("button")
.forEach(btn=>{

btn.classList.remove("active");

});



button.classList.add("active");


}





// автоматические месяцы

const months=[

"Январь",
"Февраль",
"Март",
"Апрель",
"Май",
"Июнь",
"Июль",
"Август",
"Сентябрь",
"Октябрь",
"Ноябрь",
"Декабрь"

];



function createMonths(){


let box=document
.getElementById("months");


let date=new Date();


let current=date.getMonth();



for(let i=0;i<3;i++){


let btn=document.createElement("button");


btn.innerHTML=
months[(current+i)%12];



btn.onclick=function(){

selectOption(this);

};



box.appendChild(btn);


}



}


createMonths();







// AI подбор


function aiSearch(){


let people=
document
.querySelector("#people .active")?.innerText
||
"Не выбрано";



let month=
document
.querySelector("#months .active")?.innerText
||
"Не выбран";



let country=
document
.querySelector("#country .active")?.innerText
||
"Не выбрано";



let budget=
document
.querySelector("#budget .active")?.innerText
||
"Не выбран";





alert(

"🤖 Alfa Ai Travel анализирует:\n\n"+

people+"\n"+

month+"\n"+

country+"\n"+

"Бюджет: "+budget+

"\n\nПодбираем лучшие варианты тура..."

);


}






// отправка регистрации в Telegram

function sendTelegram(){



let name=
document.getElementById("name").value;


let phone=
document.getElementById("phone").value;


let email=
document.getElementById("email").value;




let text=

"Alfa Ai Travel - новая регистрация%0A%0A"+

"ФИО: "+name+"%0A"+

"Телефон: "+phone+"%0A"+

"Почта: "+email;



window.open(

"https://t.me/kimand8?text="+text,

"_blank"

);



}



</script>



</body>

</html>
